<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Adra Product Studio - AI Lead Qualification Assistant. Automated lead qualification through natural conversation.">
    <title>Adra Product Studio - AI Lead Qualification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Opening Screen -->
    <div id="opening-screen" class="opening-screen active">
        <div class="opening-content">
            <h1 class="opening-title">Welcome to Adra Product Studio</h1>
            <button id="continue-btn" class="continue-btn glass-card">
                <span>Continue to Chat</span>
                <div class="btn-glow"></div>
            </button>
        </div>
        <div class="background-layers">
            <div class="background-gradient"></div>
            <canvas id="particle-canvas" class="particle-canvas"></canvas>
            <div class="background-glow"></div>
        </div>
    </div>

    <!-- Chat Experience -->
    <div id="chat-screen" class="chat-screen">
        <div class="chat-container">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="header-left">
                    <img src="adra_logo.png" alt="Adra" class="adra-logo" id="adra-logo">
                    <div class="header-text">
                        <h2 id="bot-title">Adra Lead Assistant</h2>
                        <p id="bot-subtitle">Let's discover your product vision</p>
                    </div>
                </div>

                <div class="header-right">
                </div>
            </div>

            <!-- Removed hidden items from header flexbox - positioned absolutely to avoid flow impact -->
            <canvas id="constellation-canvas" class="constellation-canvas" style="display: none;"></canvas>
            <div class="insight-counter" style="display: none;">
                <span>Insights:</span>
                <span id="insight-count">0</span>
            </div>

            <!-- Messages Area - Start empty for dynamic greeting -->
            <div id="messages-area" class="messages-area"></div>

            <!-- Typing Indicator -->
            <div id="typing-indicator" class="typing-indicator hidden">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <!-- Message Input -->
            <div class="message-input-container">
                <input type="file" id="file-input" class="file-input" style="display: none;">
                <button class="upload-btn magnetic-btn" id="upload-btn" title="Attach Files">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                        </path>
                    </svg>
                </button>
                <div id="file-preview" class="file-preview hidden">
                    <span class="file-name"></span>
                    <button id="remove-file-btn" class="remove-file-btn">&times;</button>
                </div>
                <input type="text" id="message-input" class="message-input" placeholder="Tell us what you're building…"
                    autocomplete="off">
                <button id="mic-btn" class="mic-btn magnetic-btn" title="Voice Input">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1v11"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <button id="send-btn" class="send-btn magnetic-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>



        <div class="background-layers">
            <div class="background-gradient"></div>
            <canvas id="particle-canvas-chat" class="particle-canvas"></canvas>
            <div class="background-glow"></div>
        </div>
    </div>

    <script src="app_v4.js"></script>
</body>

</html>
